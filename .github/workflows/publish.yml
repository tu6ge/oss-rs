name: Test and Publish

on:
  push:
    branches:
      - "master"
      - "branch*"
  pull_request:
    branches:
      - "*"

jobs:
  publish:
    runs-on: ubuntu-latest

    name: "publish"

    environment: cargo

    outputs:
      root_published: ${{ steps.publish_root.outputs.publish }}
      root_version: ${{ steps.publish_root.outputs.new_version_value }}
      object_store_published: ${{ steps.publish_object_store.outputs.publish }}
      object_store_version: ${{ steps.publish_object_store.outputs.new_version_value }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check fmt
        run: cargo fmt --check

      - name: Check clippy
        run: cargo clippy --all-targets --all-features -- --deny warnings

      - name: Show cargo info
        run: cargo version --verbose

      - name: Run Test
        run: |
          cargo test --doc

      # 仅 master 分支 push 时执行发布（PR / 其他分支只跑检查与测试）
      # 先发布主 crate，再发布 object_store（依赖前者）
      - name: Publish aliyun-oss-client
        id: publish_root
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: tu6ge/publish-action@v0.6.0-beta.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: "/"
          TAG_PREFIX: "v"

      # - name: Publish aliyun-oss-object-store
      #   id: publish_object_store
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      #   uses: tu6ge/publish-action@v0.6.0-beta.3
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      #   with:
      #     DIR: "/crates/object_store/"
      #     TAG_PREFIX: "object-store-v"
  
  release-client:
    runs-on: ubuntu-latest
    name: Create Release (aliyun-oss-client)
    needs: publish
    if: needs.publish.outputs.root_published == 'true'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag from publish job
        id: version
        run: |
          VERSION="${{ needs.publish.outputs.root_version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff/client.toml
          args: --tag ${{ steps.version.outputs.tag }} --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: aliyun-oss-client ${{ steps.version.outputs.tag }}
          body: ${{ steps.cliff.outputs.content }}
          draft: false
          prerelease: false

  release-object-store:
    runs-on: ubuntu-latest
    name: Create Release (aliyun-oss-object-store)
    needs: publish
    if: needs.publish.outputs.object_store_published == 'true'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag from publish job
        id: version
        run: |
          VERSION="${{ needs.publish.outputs.object_store_version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=object-store-v${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff/object-store.toml
          args: --tag ${{ steps.version.outputs.tag }} --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: aliyun-oss-object-store ${{ steps.version.outputs.tag }}
          body: ${{ steps.cliff.outputs.content }}
          draft: false
          prerelease: false

